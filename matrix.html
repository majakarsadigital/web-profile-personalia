<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Matrix Rain Effect</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        background: black;
        overflow: hidden;
        font-family: monospace;
    }

    canvas {
        display: block;
    }

    .title, .description {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        overflow: hidden;
        border-right: 2px solid currentColor;
        display: inline-block;
    }

    /* TITLE */
    .title {
        top: 45%;
        color: #00ff41;
        font-size: 22px;
        letter-spacing: 2px;
        text-shadow: 0 0 8px #00ff41;

        opacity: 0;
        width: 0;

        animation: 
            typingTitle 1s steps(14, end) forwards,
            fadeIn 0.3s forwards,
            blink 0.7s infinite;
    }

    /* DESCRIPTION */
    .description {
        top: 50%;
        color: #00b3ff;
        font-size: 22px;
        letter-spacing: 2px;
        text-shadow: 0 0 8px #00b3ff;

        opacity: 0;
        width: 0;

        animation: 
            typingDesc 1s steps(15, end) forwards,
            fadeIn 0.3s forwards,
            blink 0.7s infinite;

        animation-delay: 2.2s; /* penting! */
    }

    /* typing sesuai panjang teks */
    @keyframes typingTitle {
        from { width: 0 }
        to { width: 15ch }
    }

    @keyframes typingDesc {
        from { width: 0 }
        to { width: 16ch }
    }

    /* cursor */
    @keyframes blink {
        50% { border-color: transparent }
    }

    /* biar muncul */
    @keyframes fadeIn {
        to { opacity: 0.8 }
    }
</style>
</head>
<body>

<div class="title">SYSTEM ACCESS</div>
<div class="description">SELAMAT DATANG</div>
<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const letters = "アァカサタナハマヤャラワン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const chars = letters.split("");

const fontSize = 16;
let columns = canvas.width / fontSize;

let drops = [];
for (let i = 0; i < columns; i++) {
    drops[i] = Math.random() * canvas.height;
}

function draw() {
    // fade background (jejak hujan)
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff41";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 35);
</script>

</body>
</html>
